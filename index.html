<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính Điện Nước 4 Hộ - Đội Cấn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f1f5f9;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .tab-active {
            border-bottom: 4px solid #3b82f6;
            color: #3b82f6;
            font-weight: 900;
        }
        .input-focus:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }
        /* Hiệu ứng đóng mở mượt mà */
        .accordion-content {
            display: none;
        }
        .accordion-open .accordion-content {
            display: block;
        }
        .accordion-open .chevron-icon {
            transform: rotate(180deg);
        }
    </style>
</head>
<body class="p-4 md:p-8 pb-24">
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        <!-- Header & Tabs -->
        <div class="bg-white border-b">
            <h1 class="text-2xl font-black text-center py-6 text-gray-800 uppercase tracking-tighter">Chi Phí Điện Nước</h1>
            <div class="flex">
                <button onclick="switchMode('electric')" id="tab-electric" class="flex-1 py-4 text-base uppercase tracking-wider transition-all">
                    ⚡ Điện
                </button>
                <button onclick="switchMode('water')" id="tab-water" class="flex-1 py-4 text-base uppercase tracking-wider transition-all">
                    💧 Nước
                </button>
                <button onclick="switchMode('history')" id="tab-history" class="flex-1 py-4 text-base uppercase tracking-wider text-gray-400 border-b-2 border-transparent hover:text-blue-500 transition-all font-bold">
                    📜 Lịch sử
                </button>
            </div>
        </div>

        <div class="p-6">
            <!-- SECTION: CALCULATOR -->
            <div id="section-calc">
                <!-- Bảng giá & Cấu hình thuế -->
                <div id="price-board" class="mb-6 p-5 bg-blue-50 rounded-2xl border border-blue-100 shadow-inner">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-xs font-black text-blue-800 uppercase tracking-widest">Biểu giá & Thuế</span>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] text-blue-500 font-black uppercase">Thuế:</span>
                            <input type="number" id="tax-rate-input" oninput="calculate()" class="w-14 text-center text-sm bg-white border-2 border-blue-200 rounded-xl py-1 font-black text-blue-700 input-focus" value="8">
                            <span class="text-[10px] text-blue-500 font-black">%</span>
                        </div>
                    </div>
                    <div id="price-grid" class="grid grid-cols-2 gap-x-6 gap-y-2 text-xs text-gray-700 font-bold"></div>
                </div>

                <!-- Inputs -->
                <div class="space-y-6">
                    <div id="input-fields" class="space-y-6"></div>
                    <button onclick="calculate()" id="btn-calc" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl hover:bg-blue-700 shadow-xl shadow-blue-200 transition-all active:scale-95 mt-4 uppercase tracking-widest text-base">
                        Tính Tiền Điện
                    </button>
                </div>

                <!-- Results -->
                <div id="results" class="hidden mt-10 space-y-5">
                    <div class="p-4 bg-gray-50 rounded-2xl border border-gray-100 text-sm text-gray-600 flex justify-between items-center">
                        <span class="font-bold uppercase text-[10px] tracking-widest">Tổng tiêu thụ cả khu:</span>
                        <span id="total_usage" class="font-black text-gray-900 text-lg">0</span>
                    </div>

                    <div id="bill_list" class="space-y-4"></div>
                    
                    <div class="p-5 bg-gray-900 rounded-3xl flex justify-between items-center shadow-2xl border-t-4 border-yellow-500">
                        <span class="text-white text-sm font-black uppercase tracking-widest">Tổng hóa đơn</span>
                        <span id="grand_total" class="text-yellow-400 font-black text-2xl tracking-tighter">0đ</span>
                    </div>
                    
                    <div class="flex gap-3">
                        <button onclick="saveToHistory()" class="flex-1 bg-green-600 text-white font-black py-4 rounded-xl text-sm uppercase tracking-widest hover:bg-green-700 shadow-lg transition-all active:scale-95">
                            💾 Lưu lịch sử
                        </button>
                        <button onclick="resetInputs()" class="bg-gray-200 text-gray-600 font-black py-4 px-6 rounded-xl text-xs uppercase hover:bg-gray-300">
                            Làm mới
                        </button>
                    </div>
                </div>
            </div>

            <!-- SECTION: HISTORY -->
            <div id="section-history" class="hidden">
                <div class="flex justify-between items-center mb-6 px-1">
                    <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest italic">Lịch sử thu tiền</h2>
                    <!-- Đã loại bỏ nút Xóa tất cả tại đây -->
                </div>
                <div id="history-list" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-8 py-4 rounded-full text-sm font-black shadow-2xl opacity-0 transition-opacity pointer-events-none z-50"></div>

    <script>
        let currentMode = 'electric';
        let lastResult = null;
        const NAMES = ["Nhà Thờ", "Cô Hà", "Chị Thu", "Hoàng Anh"];
        
        const ELECTRIC_TIERS = [
            { label: '0-50', price: 1984, limit: 50 },
            { label: '51-100', price: 2050, limit: 100 },
            { label: '101-200', price: 2380, limit: 200 },
            { label: '201-300', price: 2998, limit: 300 },
            { label: '301-400', price: 3350, limit: 400 },
            { label: '>400', price: 3460, limit: Infinity }
        ];

        const WATER_TIERS = [
            { label: '0-10', price: 8500, limit: 10 },
            { label: '10-20', price: 9900, limit: 20 },
            { label: '20-30', price: 16000, limit: 30 },
            { label: '>30', price: 27000, limit: Infinity }
        ];

        function renderInputs() {
            const container = document.getElementById('input-fields');
            const unit = currentMode === 'electric' ? 'kWh' : 'm³';
            container.innerHTML = NAMES.map((name, i) => `
                <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100 shadow-sm">
                    <div class="flex justify-between items-center mb-3">
                        <label class="text-lg font-black text-gray-800 uppercase tracking-tight">${name}</label>
                        <span id="diff_${i+1}" class="text-xl font-black text-blue-600 italic">0 ${unit}</span>
                    </div>
                    <div class="flex gap-4">
                        <div class="relative flex-1">
                            <span class="absolute -top-2 left-2 bg-gray-50 px-1 text-[9px] font-black text-gray-400 uppercase z-10">Số cũ</span>
                            <input type="number" id="old_${i+1}" oninput="updateDiff(${i+1})" class="w-full border-2 border-gray-200 rounded-xl p-3 input-focus bg-white font-black text-gray-800 text-xl text-center" placeholder="0">
                        </div>
                        <div class="relative flex-1">
                            <span class="absolute -top-2 left-2 bg-gray-50 px-1 text-[9px] font-black text-gray-400 uppercase z-10">Số mới</span>
                            <input type="number" id="new_${i+1}" oninput="updateDiff(${i+1})" class="w-full border-2 border-gray-200 rounded-xl p-3 input-focus bg-white font-black text-gray-800 text-xl text-center" placeholder="0">
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateDiff(index) {
            const oldVal = parseFloat(document.getElementById(`old_${index}`).value) || 0;
            const newVal = parseFloat(document.getElementById(`new_${index}`).value) || 0;
            const unit = currentMode === 'electric' ? 'kWh' : 'm³';
            const diff = Math.max(0, newVal - oldVal);
            document.getElementById(`diff_${index}`).innerText = `${diff.toFixed(1)} ${unit}`;
        }

        function updatePriceBoard() {
            const grid = document.getElementById('price-grid');
            const tiers = currentMode === 'electric' ? ELECTRIC_TIERS : WATER_TIERS;
            const taxInput = document.getElementById('tax-rate-input');
            taxInput.value = currentMode === 'electric' ? 8 : 10;
            grid.innerHTML = tiers.map((t, index) => `
                <div class="flex justify-between border-b border-blue-100/50 py-1">
                    <span class="text-blue-900/60 font-black uppercase text-[10px]">Bậc ${index+1}:</span>
                    <span class="font-black text-blue-900">${t.price.toLocaleString('vi-VN')}đ</span>
                </div>
            `).join('');
        }

        function switchMode(mode) {
            const tabs = ['electric', 'water', 'history'];
            tabs.forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if(btn) btn.className = (t === mode) ? 'flex-1 py-4 text-base uppercase tracking-wider tab-active transition-all' : 'flex-1 py-4 text-base uppercase tracking-wider text-gray-400 border-b-2 border-transparent hover:text-blue-500 transition-all font-bold';
            });

            if (mode === 'history') {
                document.getElementById('section-calc').classList.add('hidden');
                document.getElementById('section-history').classList.remove('hidden');
                renderHistory();
            } else {
                currentMode = mode;
                document.getElementById('section-calc').classList.remove('hidden');
                document.getElementById('section-history').classList.add('hidden');
                renderInputs();
                updatePriceBoard();
                document.getElementById('btn-calc').innerText = mode === 'electric' ? 'Tính Tiền Điện' : 'Tính Tiền Nước';
                document.getElementById('results').classList.add('hidden');
            }
        }

        function formatVND(amount) {
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND', maximumFractionDigits: 0 }).format(amount);
        }

        function toggleAccordion(id) {
            const el = document.getElementById(id);
            if (el) el.classList.toggle('accordion-open');
        }

        function calculate() {
            const tiers = currentMode === 'electric' ? ELECTRIC_TIERS : WATER_TIERS;
            const taxPercent = parseFloat(document.getElementById('tax-rate-input').value) || 0;
            const vatRate = 1 + (taxPercent / 100);
            const unit = currentMode === 'electric' ? 'kWh' : 'm³';

            let members = NAMES.map((name, i) => {
                const oldVal = parseFloat(document.getElementById(`old_${i+1}`).value) || 0;
                const newVal = parseFloat(document.getElementById(`new_${i+1}`).value) || 0;
                const val = Math.max(0, newVal - oldVal);
                return { name, usage: val, oldVal: oldVal, newVal: newVal, remaining: val, cost: 0, breakdowns: [] };
            });

            let totalUsageAll = members.reduce((sum, m) => sum + m.usage, 0);
            let prevLimit = 0;

            for (let i = 0; i < tiers.length; i++) {
                let tierLimit = tiers[i].limit;
                let tierPrice = tiers[i].price;
                let tierCapacity = tierLimit === Infinity ? Infinity : (tierLimit - prevLimit);
                
                while (tierCapacity > 0) {
                    let activeMembers = members.filter(m => m.remaining > 0);
                    if (activeMembers.length === 0) break;
                    let share = tierCapacity / activeMembers.length;
                    let progress = false;
                    activeMembers.forEach(m => {
                        let take = Math.min(m.remaining, share);
                        if (take > 0) {
                            let costThisTier = take * tierPrice;
                            m.cost += costThisTier;
                            m.remaining -= take;
                            tierCapacity -= take;
                            let existing = m.breakdowns.find(b => b.tierIndex === i + 1);
                            if (existing) {
                                existing.amount += take;
                                existing.cost += costThisTier;
                            } else {
                                m.breakdowns.push({ tierIndex: i + 1, price: tierPrice, amount: take, cost: costThisTier });
                            }
                            progress = true;
                        }
                    });
                    if (!progress) break;
                }
                prevLimit = tierLimit;
            }

            let billListHtml = "";
            let grandTotalFinal = 0;
            let resultsData = [];

            members.forEach((m, idx) => {
                const totalWithTax = Math.round(m.cost * vatRate);
                grandTotalFinal += totalWithTax;
                resultsData.push({ 
                    name: m.name, 
                    usage: m.usage, 
                    oldVal: m.oldVal,
                    newVal: m.newVal,
                    costBeforeTax: m.cost, 
                    costWithTax: totalWithTax, 
                    breakdowns: JSON.parse(JSON.stringify(m.breakdowns)) 
                });
                
                let breakdownHtml = m.breakdowns.map(b => `
                    <div class="flex justify-between text-xs py-2 border-b border-gray-100 font-black">
                        <span class="text-gray-500 uppercase tracking-tighter italic">Bậc ${b.tierIndex}: <span class="text-gray-900">${b.amount.toFixed(1)} x ${b.price.toLocaleString()}đ</span></span>
                        <span class="text-gray-900">${Math.round(b.cost).toLocaleString()}đ</span>
                    </div>
                `).join('');

                billListHtml += `
                    <div id="member-${idx}" class="bg-gray-50 rounded-2xl border border-gray-100 overflow-hidden shadow-sm mb-4">
                        <div onclick="toggleAccordion('member-${idx}')" class="p-5 flex justify-between items-center cursor-pointer active:bg-gray-100">
                            <div>
                                <p class="font-black text-gray-900 text-lg uppercase tracking-tight">${m.name}</p>
                                <p class="text-[10px] font-black text-blue-800 uppercase tracking-widest italic">
                                    Số cũ: ${m.oldVal} | Số mới: ${m.newVal} (${m.usage.toFixed(1)} ${unit})
                                </p>
                            </div>
                            <div class="text-right">
                                <p class="font-black ${currentMode === 'electric' ? 'text-blue-600' : 'text-cyan-600'} text-xl tracking-tighter">${formatVND(totalWithTax)}</p>
                                <p class="text-[9px] text-gray-400 font-black uppercase italic -mt-1">Đã bao gồm ${taxPercent}% thuế</p>
                            </div>
                        </div>
                        <div class="accordion-content bg-white px-5 border-t border-gray-100">
                            <div class="py-4">
                                ${breakdownHtml}
                                <div class="flex justify-between text-xs pt-3 mt-1 border-t border-gray-100 font-black text-gray-500 uppercase">
                                    <span>Tổng tiêu thụ:</span>
                                    <span class="text-gray-900 font-black">${m.usage.toFixed(1)} ${unit}</span>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });

            document.getElementById('total_usage').innerText = totalUsageAll.toFixed(1) + " " + unit;
            document.getElementById('bill_list').innerHTML = billListHtml;
            document.getElementById('grand_total').innerText = formatVND(grandTotalFinal);
            document.getElementById('results').classList.remove('hidden');

            lastResult = {
                id: Date.now(),
                month: new Date().getMonth() + 1,
                year: new Date().getFullYear(),
                fullDate: new Date().toLocaleDateString('vi-VN'),
                type: currentMode,
                taxRate: taxPercent,
                totalUsage: totalUsageAll,
                grandTotal: grandTotalFinal,
                details: resultsData
            };
        }

        function saveToHistory() {
            if (!lastResult) return;
            let history = JSON.parse(localStorage.getItem('billing_history_final_v1') || '[]');
            history.unshift(lastResult);
            localStorage.setItem('billing_history_final_v1', JSON.stringify(history));
            showToast("Đã lưu vào lịch sử!");
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            let history = JSON.parse(localStorage.getItem('billing_history_final_v1') || '[]');
            if (history.length === 0) {
                list.innerHTML = `<div class="text-center py-16 text-gray-400 text-sm font-black italic uppercase tracking-widest">Lịch sử trống</div>`;
                return;
            }
            
            list.innerHTML = history.map((item, idx) => {
                const unit = item.type === 'electric' ? 'kWh' : 'm³';
                const colorClass = item.type === 'electric' ? 'text-blue-600' : 'text-cyan-600';
                
                let detailCards = item.details.map((d, dIdx) => `
                    <div class="border-b last:border-0 border-gray-200 py-4">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-black text-gray-800 uppercase text-sm">${d.name}</span>
                            <div class="text-right">
                                <span class="font-black text-gray-900 text-base">${formatVND(d.costWithTax)}</span>
                            </div>
                        </div>
                        <div class="text-[11px] font-black text-slate-700 uppercase tracking-tighter mb-2 italic bg-slate-100/50 p-1 rounded">
                            Số cũ: ${d.oldVal || 0} → Số mới: ${d.newVal || 0} (${d.usage.toFixed(1)} ${unit})
                        </div>
                        <div class="space-y-1 mb-2">
                            ${d.breakdowns.map(b => `
                                <div class="flex justify-between text-[10px] text-gray-500 font-bold uppercase italic tracking-tighter">
                                    <span>Bậc ${b.tierIndex} (${b.amount.toFixed(1)} x ${b.price.toLocaleString()}đ)</span>
                                    <span>${Math.round(b.cost).toLocaleString()}đ</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="flex justify-between text-[10px] pt-1 text-gray-900 font-black uppercase">
                            <span>Tiêu thụ: ${d.usage.toFixed(1)} ${unit}</span>
                            <span class="text-[9px] text-gray-400 italic">Gồm ${item.taxRate}% thuế</span>
                        </div>
                    </div>
                `).join('');

                return `
                <div id="hist-${item.id}" class="bg-white rounded-3xl border-2 border-gray-50 shadow-sm overflow-hidden transition-all mb-4">
                    <div onclick="toggleAccordion('hist-${item.id}')" class="p-5 flex justify-between items-center cursor-pointer active:bg-gray-50">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-100 text-lg">
                                ${item.type === 'electric' ? '⚡' : '💧'}
                            </div>
                            <div>
                                <h3 class="font-black text-gray-800 text-base uppercase tracking-tighter">Tháng ${item.month}/${item.year}</h3>
                                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">${item.totalUsage.toFixed(1)} ${unit}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="text-right">
                                <p class="font-black ${colorClass} text-lg tracking-tighter">${formatVND(item.grandTotal)}</p>
                                <span class="text-[9px] font-black text-gray-300 uppercase italic">Gồm ${item.taxRate}% thuế</span>
                            </div>
                            <svg class="chevron-icon w-4 h-4 text-gray-300 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                    
                    <div class="accordion-content bg-gray-50/50 px-5 border-t border-gray-100">
                        <div class="py-4">
                            ${detailCards}
                            <div class="mt-4 p-4 bg-gray-900 rounded-2xl text-white flex justify-between items-center shadow-lg">
                                <div class="text-[10px] font-black text-gray-400 uppercase">
                                    <div>Tiêu thụ: ${item.totalUsage.toFixed(1)} ${unit}</div>
                                    <div class="italic">Lưu ngày: ${item.fullDate}</div>
                                </div>
                                <div class="text-right font-black uppercase">
                                    <div class="text-[10px] text-yellow-500 italic">Tổng hóa đơn</div>
                                    <div class="text-xl text-yellow-400 tracking-tighter">${formatVND(item.grandTotal)}</div>
                                </div>
                            </div>
                            <button onclick="deleteHistory(${item.id})" class="w-full mt-4 text-[10px] font-black text-red-400 uppercase tracking-widest p-2 border border-red-100 rounded-xl hover:bg-red-50">Xóa bản ghi này</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function deleteHistory(id) {
            if(!confirm("Xóa bản ghi này?")) return;
            let history = JSON.parse(localStorage.getItem('billing_history_final_v1') || '[]');
            localStorage.setItem('billing_history_final_v1', JSON.stringify(history.filter(i => i.id !== id)));
            renderHistory();
        }

        // Đã vô hiệu hóa nút xóa tất cả ngoài giao diện nhưng giữ lại hàm này để code không lỗi
        function clearAllHistory() { }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2000);
        }

        function resetInputs() {
            NAMES.forEach((_, i) => {
                const oldInput = document.getElementById(`old_${i+1}`);
                const newInput = document.getElementById(`new_${i+1}`);
                if(oldInput) oldInput.value = '';
                if(newInput) newInput.value = '';
                updateDiff(i+1);
            });
            document.getElementById('results').classList.add('hidden');
            lastResult = null;
        }

        window.onload = () => switchMode('electric');
    </script>
</body>
</html>
