
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính Tiền Điện Đơn Giản</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: sans-serif;
        }
        .input-focus:focus {
            border-color: #3b82f6;
            ring: 2px;
            ring-color: #bfdbfe;
        }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6 border border-gray-100">
        <h1 class="text-2xl font-bold text-center text-blue-600 mb-6 uppercase tracking-tight">Tính Tiền Điện 4 Hộ</h1>
        
        <div class="mb-6 p-4 bg-blue-50 rounded-lg border border-blue-200">
            <p class="text-xs text-blue-800 font-bold mb-2 uppercase">Phương pháp tính:</p>
            <p class="text-[11px] text-blue-700 leading-relaxed">
                Chia sẻ định mức: 4 hộ cùng nhau dùng hết các bậc giá rẻ theo thứ tự. 
                Hộ dùng ít chỉ trả giá bậc thấp. Hộ dùng nhiều trả phần vượt cấp.
                <br><strong>(Đã bao gồm thuế VAT 8%)</strong>
            </p>
        </div>

        <div class="space-y-4">
            <!-- Nhập số kWh với tên riêng -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Nhà Thờ (Số kWh)</label>
                <input type="number" id="kwh_1" class="w-full border rounded-lg p-2 input-focus outline-none" placeholder="0">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Cô Hà (Số kWh)</label>
                <input type="number" id="kwh_2" class="w-full border rounded-lg p-2 input-focus outline-none" placeholder="0">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Chị Thu (Số kWh)</label>
                <input type="number" id="kwh_3" class="w-full border rounded-lg p-2 input-focus outline-none" placeholder="0">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Hoàng Anh (Số kWh)</label>
                <input type="number" id="kwh_4" class="w-full border rounded-lg p-2 input-focus outline-none" placeholder="0">
            </div>

            <div class="pt-4">
                <button onclick="calculateSharedTiers()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-colors shadow-md">
                    TÍNH TIỀN CHIA SẺ BẬC
                </button>
            </div>
        </div>

        <!-- Kết quả -->
        <div id="results" class="hidden mt-6 border-t pt-4 space-y-3">
            <div id="bill_list"></div>
            
            <div class="mt-4 p-3 bg-gray-800 text-white rounded-lg flex justify-between font-bold">
                <span>TỔNG CỘNG:</span>
                <span id="grand_total">0đ</span>
            </div>
            <p class="text-[10px] text-gray-400 text-center italic mt-2">* Giá tính theo bậc thang + 8% thuế VAT</p>
        </div>
    </div>

    <script>
        const PRICING_TIERS = [
            { limit: 50, price: 1984 },
            { limit: 100, price: 2050 },
            { limit: 200, price: 2380 },
            { limit: 300, price: 2998 },
            { limit: 400, price: 3350 },
            { limit: Infinity, price: 3460 }
        ];

        const NAMES = ["Nhà Thờ", "Cô Hà", "Chị Thu", "Hoàng Anh"];

        function formatVND(amount) {
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
        }

        function calculateSharedTiers() {
            const VAT_RATE = 1.08; // Thuế VAT 8%
            let members = [];
            for (let i = 1; i <= 4; i++) {
                members.push({
                    name: NAMES[i-1],
                    usage: parseFloat(document.getElementById(`kwh_${i}`).value) || 0,
                    remaining: parseFloat(document.getElementById(`kwh_${i}`).value) || 0,
                    cost: 0
                });
            }

            let prevLimit = 0;
            // Duyệt qua từng bậc giá của hóa đơn tổng
            for (let i = 0; i < PRICING_TIERS.length; i++) {
                let tierCapacity = PRICING_TIERS[i].limit - prevLimit;
                
                while (tierCapacity > 0) {
                    let activeMembers = members.filter(m => m.remaining > 0);
                    if (activeMembers.length === 0) break;

                    let share = tierCapacity / activeMembers.length;
                    let consumptionInThisTurn = false;

                    activeMembers.forEach(m => {
                        let take = Math.min(m.remaining, share);
                        if (take > 0) {
                            m.cost += take * PRICING_TIERS[i].price;
                            m.remaining -= take;
                            tierCapacity -= take;
                            consumptionInThisTurn = true;
                        }
                    });

                    if (!consumptionInThisTurn) break;
                }
                
                prevLimit = PRICING_TIERS[i].limit;
                if (members.every(m => m.remaining <= 0)) break;
            }

            // Hiển thị kết quả
            let billListHtml = "";
            let grandTotal = 0;

            members.forEach(m => {
                // Tính toán bao gồm thuế VAT
                const totalFinal = Math.round(m.cost * VAT_RATE);
                grandTotal += totalFinal;
                billListHtml += `
                    <div class="flex justify-between items-center border-b pb-2">
                        <div>
                            <p class="font-bold text-gray-800 text-sm">${m.name}</p>
                            <p class="text-xs text-gray-500">${m.usage} kWh</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-blue-700">${formatVND(totalFinal)}</p>
                        </div>
                    </div>
                `;
            });

            document.getElementById('bill_list').innerHTML = billListHtml;
            document.getElementById('grand_total').innerText = formatVND(grandTotal);
            document.getElementById('results').classList.remove('hidden');
        }
    </script>
</body>
</html>
